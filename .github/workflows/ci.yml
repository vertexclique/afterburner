name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# A new push to the same branch (or a fresh PR commit) cancels any
# earlier in-progress run for that branch / PR. Saves runner minutes
# and keeps the actions tab focused on what's current.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  # Keep network-flaky DNS tests bounded.
  RUST_TEST_THREADS: 4

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ''
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          target: wasm32-wasip1
          rustflags: ''
      - name: Install libclang (rquickjs-sys bindgen)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - name: clippy (workspace, default features)
        # Exclude afterburner-plugin: it targets wasm32-wasip1 only and
        # can't compile on the host triple (no_std, no panic_handler).
        run: cargo clippy --workspace --exclude afterburner-plugin --all-targets -- -D warnings
      - name: clippy (afterburner with release-cli features)
        run: cargo clippy -p afterburner --all-targets --features release-cli -- -D warnings

  test:
    name: cargo test (x86_64-linux)
    # Tests run on a single target — x86_64 Linux. The runtime is
    # platform-portable but the test surface gets long, and CI minutes
    # add up; macOS / Windows test coverage is paid for at release
    # time by the multi-target build matrix in release.yml. If a
    # platform-specific bug reproduces, add a one-off job here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip1
          rustflags: ''
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (default features, library-only)
        # `bin` is NOT in default features, so any test using
        # `env!("CARGO_BIN_EXE_burn")` is `#![cfg(feature = "bin")]`-
        # gated and skipped here. Default-features pass exists to
        # catch breakage in the library API surface (the path that
        # downstream `cargo install afterburner` users compile).
        run: cargo test --workspace --no-fail-fast -- --test-threads=4
      - name: cargo test (bin + all-shadows + ts)
        # Full-feature pass: includes the integration tests that spawn
        # the `burn` CLI as a subprocess (b7_*, b10_*, b_wasm_loader,
        # b_node_compat_round2, b_shadow_*, b8/b9 ts+esm pipelines).
        run: cargo test -p afterburner --features "bin all-shadows ts" --no-fail-fast -- --test-threads=4

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (no deps)
        # Don't gate CI on broken intra-doc links — they're warnings
        # not generation failures. Plugin excluded since it builds
        # for wasm32-wasip1 only.
        run: cargo doc --workspace --exclude afterburner-plugin --no-deps

  plugin-rebuild:
    name: plugin .wasm reproducible build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip1
          rustflags: ''
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - name: Install Binaryen (wasm-opt)
        # 129 ships the `--llvm-memory-copy-fill-lowering` and
        # `--llvm-nontrapping-fptoint-lowering` flags that the plugin
        # build needs to lower modern WASM features for javy 8.1.1's
        # bundled validator. 119 was too old.
        run: |
          curl -sSL https://github.com/WebAssembly/binaryen/releases/download/version_129/binaryen-version_129-x86_64-linux.tar.gz \
            | tar xz -C /tmp
          echo "/tmp/binaryen-version_129/bin" >> "$GITHUB_PATH"
      - name: Install javy
        run: |
          curl -sSL https://github.com/bytecodealliance/javy/releases/download/v8.1.1/javy-x86_64-linux-v8.1.1.gz \
            | gunzip > /tmp/javy
          chmod +x /tmp/javy
          sudo mv /tmp/javy /usr/local/bin/javy
      - uses: Swatinem/rust-cache@v2
      - name: Rebuild plugin and verify checksum matches
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir=crates/afterburner-wasi/plugin
          # Stash the current artifact + sha
          cp "$plugin_dir/afterburner_plugin.wasm" /tmp/expected.wasm
          cp "$plugin_dir/afterburner_plugin.wasm.bundle-sha256" /tmp/expected.sha
          bash crates/afterburner-plugin/build.sh
          # The wizer pre-init step is non-deterministic on metadata
          # (timestamps embedded in custom sections). We compare the
          # *bundle* (polyfills/plenum) sha which build.sh writes to
          # the .bundle-sha256 sidecar — that's content-addressed.
          diff -u /tmp/expected.sha "$plugin_dir/afterburner_plugin.wasm.bundle-sha256"
