name: Release

# Builds the `burn` CLI binary for every supported target and attaches
# the archives to the GitHub Release named after the pushed tag.
#
# IMPORTANT: this workflow does NOT run `cargo release` or
# `cargo publish`. crates.io publishing is intentionally a manual,
# local-only step (see `release.toml` and the project README) — running
# it from CI is dangerous (lost CI runs can leave the workspace
# half-published; cargo publish is one-way and versions can't be
# unpublished). The publish flow is:
#
#   1. Locally: `cargo release --execute <bump>` bumps + commits +
#      tags + pushes the tag.
#   2. The tag push fires THIS workflow, which builds + attaches
#      multi-platform burn binaries to the GitHub Release.
#   3. crates.io publishing happens locally, separately, by the
#      maintainer running `cargo publish` per crate (or
#      `cargo release --execute` with publish=true on a trusted
#      machine).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build for (e.g. v0.1.0). The tag must already exist on the repo.'
        required: true
        type: string

permissions:
  contents: write

# Releases are tag-specific. Two parallel runs for the same tag would
# race when uploading artifacts to the GitHub Release, so group by
# tag/ref. `cancel-in-progress: false` so an accidental retry never
# kills an in-flight build that's about to finish — the second run
# just queues behind it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build burn (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # x86_64-apple-darwin is intentionally NOT in the release
          # matrix. GitHub's `macos-13` runner (the last x86_64 macOS
          # tier) is end-of-life and resource-starved — jobs queue
          # 15+ minutes waiting for runner pickup, blocking the
          # whole `attach-binaries` step. Apple's been ARM-only for
          # new Macs since 2020; x86_64 macOS users on the
          # increasingly small Intel-Mac install base can run the
          # aarch64 binary under Rosetta if they need to.
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          # aarch64-pc-windows-msvc is intentionally NOT in the
          # release matrix. rustls's default Ring crypto backend
          # lacks aarch64-windows assembly, and the resulting build
          # failure cascades into 56+ "cannot find rustls" errors
          # across `daemon_tls.rs`. Re-enable when we migrate to the
          # `aws-lc-rs` crypto provider (which supports all four
          # major Tier 1/2 platform×arch combos). x86_64-pc-windows-
          # msvc above covers the bulk of Windows users; ARM Windows
          # users can run the x86_64 binary under emulation in the
          # meantime.
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ''
      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Install libclang (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Install aarch64 GCC cross-toolchain (Linux)
        # Native cross-compile via the Ubuntu-shipped gcc-aarch64-linux-gnu
        # rather than cross-rs. Drops a third-party orchestrator that's
        # been failing on conflicting transitive Cargo.toml metadata
        # (getrandom 0.2/0.3/0.4 carry their own [package.metadata.cross]
        # blocks and cross refuses to merge them).
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build burn (cli-release profile, full features)
        shell: bash
        env:
          CARGO_PROFILE_CLI_RELEASE_CODEGEN_UNITS: '1'
          CARGO_PROFILE_CLI_RELEASE_LTO: 'fat'
          # Linker for the aarch64-linux cross target. cargo reads the
          # CARGO_TARGET_<TRIPLE>_LINKER env var when building the matching
          # target. No-op for native targets.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --profile cli-release \
            --target ${{ matrix.target }} \
            -p afterburner --bin burn \
            --no-default-features \
            --features release-cli

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.name }}"
          target="${{ matrix.target }}"
          version="${tag#v}"
          stem="burn-${version}-${target}"
          stage="dist/${stem}"
          mkdir -p "${stage}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${target}/cli-release/burn.exe" "${stage}/burn.exe"
          else
            cp "target/${target}/cli-release/burn" "${stage}/burn"
            chmod +x "${stage}/burn"
          fi
          cp README.md "${stage}/README.md"
          cp -r docs "${stage}/docs" || true
          # License file.
          [[ -f LICENSE ]] && cp LICENSE "${stage}/"
          echo "stem=${stem}" >> "$GITHUB_OUTPUT"
          echo "stage=${stage}" >> "$GITHUB_OUTPUT"

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stem="${{ steps.stage.outputs.stem }}"
          tar -C dist -czf "dist/${stem}.tar.gz" "${stem}"
          (cd dist && shasum -a 256 "${stem}.tar.gz" > "${stem}.tar.gz.sha256")

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stem = "${{ steps.stage.outputs.stem }}"
          Compress-Archive -Path "dist/$stem/*" -DestinationPath "dist/$stem.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stem.zip").Hash.ToLower()
          "$hash  $stem.zip" | Out-File -Encoding ascii -FilePath "dist/$stem.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: burn-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 7

  attach-binaries:
    name: attach binaries to GitHub release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.name }}"
          notes_file="$(mktemp)"
          {
            echo "# burn ${tag}"
            echo
            echo "Sandboxed JavaScript runtime CLI. Drop-in for Node-style scripts, runs untrusted JS in a Wasmtime sandbox."
            echo
            echo "## Install"
            echo
            echo '```sh'
            echo "# Linux x86_64"
            echo "curl -L https://github.com/${{ github.repository }}/releases/download/${tag}/burn-${tag#v}-x86_64-unknown-linux-gnu.tar.gz | tar xz"
            echo "sudo mv burn-${tag#v}-x86_64-unknown-linux-gnu/burn /usr/local/bin/"
            echo
            echo "# macOS arm64"
            echo "curl -L https://github.com/${{ github.repository }}/releases/download/${tag}/burn-${tag#v}-aarch64-apple-darwin.tar.gz | tar xz"
            echo "sudo mv burn-${tag#v}-aarch64-apple-darwin/burn /usr/local/bin/"
            echo '```'
            echo
            echo "## Verify"
            echo
            echo "Each archive ships with an accompanying \`.sha256\` file."
            echo
            echo "## Bundled features"
            echo
            echo "Built with \`--features release-cli\`: bin + wasm + native + adaptive + thrust + flow + host-http + ts + all-shadows."
          } > "$notes_file"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" --notes-file "$notes_file" --title "$tag"
          fi
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip dist/*.sha256)
          gh release upload "$tag" "${assets[@]}" --clobber
